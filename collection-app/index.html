<style>

* { box-sizing: border-box; }

<body>
<div id="root"></div>

<script>
'use strict';

/* =========================== Constants ============================ */
// Auto-import Client ID from URL param ?cid=... (used in shared links)
(function() {
  const p = new URLSearchParams(location.search).get('cid');
  if (p && p.endsWith('.apps.googleusercontent.com') && !localStorage.getItem('collection_google_client_id')) {
    localStorage.setItem('collection_google_client_id', p);
    // Clean URL without reloading
    const clean = location.pathname + location.hash;
    history.replaceState(null, '', clean);
  }
})();
const GOOGLE_CLIENT_ID = localStorage.getItem('collection_google_client_id') || '';
const SHEETS_SCOPE = 'https://www.googleapis.com/auth/spreadsheets';

const COLUMNS = [
  { key: 'task',            header: 'משימה' },
  { key: 'follow_up_date',  header: 'תאריך מעקב', type: 'date' },
  { key: 'customer_name',   header: 'שם לקוח' },
  { key: 'customer_phone',  header: 'נייד לקוח', dir: 'ltr' },
  { key: 'customer_email',  header: 'כתובת מייל', dir: 'ltr' },
  { key: 'debt_amount',     header: 'סכום החוב' },
  { key: 'invoice_number',  header: "מס' חשבונית" },
  { key: 'balance_due',     header: 'יתרה לתשלום' },
  { key: 'payment_method',  header: 'אמצעי תשלום', options: ['', 'כרטיס אשראי', 'העברה בנקאית', 'ביט', 'מזומן', 'אחר'] },
  { key: 'notes',           header: 'הערות' },
];

/* =========================== Storage helpers ============================ */
const LS = {
  get(key, fallback) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } },
  set(key, value) { localStorage.setItem(key, JSON.stringify(value)); },
};
function getClients()           { return LS.get('collection_clients', []); }
function setClients(list)       { LS.set('collection_clients', list); }
function getItems(clientId)     { return LS.get('collection_items_' + clientId, []); }
function setItems(clientId, items) { LS.set('collection_items_' + clientId, items); }
function getLastSync(clientId)  { return localStorage.getItem('collection_lastsync_' + clientId) || null; }
function setLastSync(clientId)  { localStorage.setItem('collection_lastsync_' + clientId, new Date().toISOString()); }

/* timed reminders storage */
function getTimedReminders()    { return LS.get('collection_timed_reminders', []); }
function setTimedReminders(arr) { LS.set('collection_timed_reminders', arr); }

function uid()      { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function nowIso()   { return new Date().toISOString(); }
function todayStr() { return new Date().toISOString().slice(0, 10); }
function nowLocalDatetime() {
  const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
}

function extractSheetId(input) {
  if (!input) return null;
  const m = input.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if (m) return m[1];
  if (/^[a-zA-Z0-9-_]{20,}$/.test(input.trim())) return input.trim();
  return null;
}

/* =========================== Google auth ============================ */
let gTokenClient = null;
let gAccessToken = sessionStorage.getItem('collection_g_token') || null;
let gTokenExpiry  = Number(sessionStorage.getItem('collection_g_token_exp') || 0);

function isGoogleAuthorized() { return !!gAccessToken && Date.now() < gTokenExpiry; }

function initGoogleAuth() {
  if (!window.google || !GOOGLE_CLIENT_ID) return;
  gTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID, scope: SHEETS_SCOPE,
    callback: (resp) => {
      if (resp?.access_token) {
        gAccessToken = resp.access_token;
        gTokenExpiry = Date.now() + (Number(resp.expires_in || 3500) * 1000);
        sessionStorage.setItem('collection_g_token', gAccessToken);
        sessionStorage.setItem('collection_g_token_exp', String(gTokenExpiry));
        render();
      }
    },
  });
}
function connectGoogle() {
  if (!GOOGLE_CLIENT_ID) { alert('יש להגדיר תחילה Client ID של Google'); return; }
  if (!gTokenClient) initGoogleAuth();
  if (gTokenClient) gTokenClient.requestAccessToken({ prompt: isGoogleAuthorized() ? '' : 'consent' });
}
async function ensureGoogleToken() {
  if (isGoogleAuthorized()) return true;
  return new Promise((resolve) => {
    if (!gTokenClient) initGoogleAuth();
    if (!gTokenClient) return resolve(false);
    const orig = gTokenClient.callback;
    gTokenClient.callback = (resp) => {
      gTokenClient.callback = orig;
      if (resp?.access_token) {
        gAccessToken = resp.access_token;
        gTokenExpiry = Date.now() + (Number(resp.expires_in || 3500) * 1000);
        sessionStorage.setItem('collection_g_token', gAccessToken);
        sessionStorage.setItem('collection_g_token_exp', String(gTokenExpiry));
        resolve(true);
      } else resolve(false);
    };
    gTokenClient.requestAccessToken({ prompt: '' });
  });
}

/* =========================== Sheets API ============================ */
async function sheetsGet(id, range) {
  const ok = await ensureGoogleToken(); if (!ok) throw new Error('לא מחוברת לחשבון Google');
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}`, { headers: { Authorization: `Bearer ${gAccessToken}` } });
  if (!res.ok) throw new Error('שגיאה בקריאת הטבלה (' + res.status + ')');
  return res.json();
}
async function sheetsUpdate(id, range, values) {
  const ok = await ensureGoogleToken(); if (!ok) throw new Error('לא מחוברת לחשבון Google');
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}?valueInputOption=RAW`, { method: 'PUT', headers: { Authorization: `Bearer ${gAccessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ values }) });
  if (!res.ok) throw new Error('שגיאה בעדכון הטבלה (' + res.status + ')');
  return res.json();
}
async function sheetsBatchUpdate(id, data) {
  const ok = await ensureGoogleToken(); if (!ok) throw new Error('לא מחוברת לחשבון Google');
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values:batchUpdate`, { method: 'POST', headers: { Authorization: `Bearer ${gAccessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ valueInputOption: 'RAW', data }) });
  if (!res.ok) throw new Error('שגיאה בעדכון הטבלה (' + res.status + ')');
  return res.json();
}
async function sheetsAppend(id, range, values) {
  const ok = await ensureGoogleToken(); if (!ok) throw new Error('לא מחוברת לחשבון Google');
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`, { method: 'POST', headers: { Authorization: `Bearer ${gAccessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ values }) });
  if (!res.ok) throw new Error('שגיאה בהוספת שורה לטבלה (' + res.status + ')');
  return res.json();
}

const RANGE_FOR = (tab) => `${tab || 'Sheet1'}!A1:J`;
function rowToItem(row) { const o = {}; COLUMNS.forEach((c,i) => o[c.key] = row[i] ?? ''); return o; }
function itemToRow(item) { return COLUMNS.map((c) => item[c.key] ?? ''); }
function rowsEqual(a, b) { return COLUMNS.every((c) => (a[c.key] ?? '') === (b[c.key] ?? '')); }

/* =========================== Sync ============================ */
async function syncClient(client) {
  if (!client.sheetId) throw new Error('ללקוח אין קישור ל-Google Sheet');
  const tab = client.sheetTab || 'Sheet1';
  const range = RANGE_FOR(tab);
  const res = await sheetsGet(client.sheetId, range);
  const values = res.values || [];
  const dataRows = values.slice(1);
  let local = getItems(client.id);
  const bySheetRow = new Map(local.filter(i => i.sheetRow != null).map(i => [i.sheetRow, i]));
  const lastSync = getLastSync(client.id);
  let pulled = 0, updated = 0;
  const seen = new Set();
  for (let i = 0; i < dataRows.length; i++) {
    const sheetRow = i + 2;
    const row = dataRows[i];
    if (!row || row.every(v => !v || String(v).trim() === '')) continue;
    seen.add(sheetRow);
    const sheetItem = rowToItem(row);
    const loc = bySheetRow.get(sheetRow);
    if (!loc) { local.push({ id: uid(), sheetRow, updatedAt: nowIso(), ...sheetItem }); pulled++; }
    else if (!rowsEqual(loc, sheetItem)) {
      const localChanged = !lastSync || (loc.updatedAt && loc.updatedAt > lastSync);
      if (!localChanged) { Object.assign(loc, sheetItem); loc.updatedAt = nowIso(); updated++; }
    }
  }
  const toAppend = local.filter(it => it.sheetRow == null);
  if (toAppend.length) {
    await sheetsAppend(client.sheetId, range, toAppend.map(itemToRow));
    toAppend.forEach((it, idx) => { it.sheetRow = values.length + 1 + idx; });
  }
  const toUpdate = local.filter(it => {
    if (it.sheetRow == null || toAppend.includes(it)) return false;
    const localChanged = !lastSync || (it.updatedAt && it.updatedAt > lastSync);
    if (!localChanged) return false;
    const sheetRow = dataRows[it.sheetRow - 2];
    return !sheetRow || !rowsEqual(it, rowToItem(sheetRow));
  });
  if (toUpdate.length) await sheetsBatchUpdate(client.sheetId, toUpdate.map(it => ({ range: `${tab}!A${it.sheetRow}:J${it.sheetRow}`, values: [itemToRow(it)] })));
  setItems(client.id, local);
  setLastSync(client.id);
  return { pulled, updated, pushedNew: toAppend.length, pushedUpdates: toUpdate.length };
}
async function pushSingleItem(client, item) {
  if (!client.sheetId || !isGoogleAuthorized()) return;
  const tab = client.sheetTab || 'Sheet1';
  try {
    if (item.sheetRow) await sheetsUpdate(client.sheetId, `${tab}!A${item.sheetRow}:J${item.sheetRow}`, [itemToRow(item)]);
    else {
      const res = await sheetsGet(client.sheetId, RANGE_FOR(tab));
      await sheetsAppend(client.sheetId, RANGE_FOR(tab), [itemToRow(item)]);
      item.sheetRow = (res.values || []).length + 1;
    }
  } catch(e) { /* best-effort */ }
}

/* =========================== Message helpers ============================ */
function buildMessage(item) {
  const name = item.customer_name || '';
  const amount = item.balance_due || item.debt_amount;
  let msg = `הי${name ? ' ' + name : ''},\nמזכירה לך את שיחתנו בנוגע לחוב`;
  if (item.invoice_number) msg += ` (חשבונית מס' ${item.invoice_number})`;
  msg += ',\n';
  if (amount) msg += `היתרה לתשלום עומדת על ${amount} ₪.\n`;
  msg += 'אשמח להעברת התשלום בהקדם. תודה!';
  return msg;
}
function normalizePhone(phone) {
  if (!phone) return '';
  let p = String(phone).replace(/[^0-9+]/g, '');
  if (p.startsWith('+')) return p.slice(1);
  if (p.startsWith('0')) return '972' + p.slice(1);
  return p;
}
function buildWhatsAppLink(item) {
  const phone = normalizePhone(item.customer_phone);
  const text = encodeURIComponent(buildMessage(item));
  return phone ? `https://wa.me/${phone}?text=${text}` : `https://wa.me/?text=${text}`;
}
function buildMailtoLink(item) {
  const subject = encodeURIComponent(`תזכורת לתשלום${item.invoice_number ? ' - חשבונית ' + item.invoice_number : ''}`);
  const body = encodeURIComponent(buildMessage(item));
  // Opens Gmail compose directly instead of the default mail app
  return `https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(item.customer_email || '')}&su=${subject}&body=${body}`;
}
function isOverdue(d) { return !!d && d <= todayStr(); }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* =========================== Browser Notifications ============================ */
function notifPermission() { return typeof Notification !== 'undefined' ? Notification.permission : 'denied'; }
function canNotif() { return notifPermission() === 'granted'; }
async function requestNotif() { if (typeof Notification === 'undefined') return false; const p = await Notification.requestPermission(); render(); return p === 'granted'; }
function sendBrowserNotif(title, body, tag) {
  if (!canNotif()) return;
  try { new Notification(title, { body, icon: 'icon.png', tag }); } catch(e) {}
}

/* =========================== Overdue reminders ============================ */
function getAllReminders() {
  const today = todayStr();
  const out = [];
  state.clients.forEach(c => {
    getItems(c.id).forEach(it => {
      if (it.follow_up_date && it.follow_up_date <= today)
        out.push({ ...it, client_id: c.id, client_name: c.name });
    });
  });
  out.sort((a, b) => (a.follow_up_date || '').localeCompare(b.follow_up_date || ''));
  return out;
}
const _firedOverdue = new Set();
function fireOverdueNotifs(reminders) {
  const today = todayStr();
  reminders.forEach(r => {
    const key = r.id + '_' + today;
    if (!_firedOverdue.has(key)) {
      _firedOverdue.add(key);
      sendBrowserNotif(`🔔 תזכורת גבייה – ${r.customer_name || 'לקוח'}`, `${r.task || ''}${r.balance_due ? ' | יתרה: ₪' + r.balance_due : ''}`, key);
    }
  });
}
function getReminderSnooze() { return Number(localStorage.getItem('collection_reminder_snooze') || 0); }
function setReminderSnooze(ms) { localStorage.setItem('collection_reminder_snooze', String(ms)); }
function isReminderSnoozed() { return Date.now() < getReminderSnooze(); }
function getDismissedDate() { return localStorage.getItem('collection_reminder_dismissed') || ''; }
function setDismissedDate() { localStorage.setItem('collection_reminder_dismissed', todayStr()); }

/* =========================== Timed reminders ============================ */
const _firedTimed = new Set();

function checkTimedReminders() {
  const now = Date.now();
  let changed = false;
  const list = getTimedReminders();
  list.forEach(tr => {
    if (tr.fired) return;
    if (new Date(tr.datetime).getTime() <= now) {
      tr.fired = true; changed = true;
      if (!_firedTimed.has(tr.id)) {
        _firedTimed.add(tr.id);
        sendBrowserNotif(`⏰ תזכורת: ${tr.customerName || 'לקוח'}`, tr.task || 'תזכורת גבייה', tr.id);
        state.firingTimedReminder = tr;
        render();
      }
    }
  });
  if (changed) setTimedReminders(list);
}

function addTimedReminder(itemId, clientId, datetime, item) {
  const list = getTimedReminders();
  list.push({
    id: uid(), itemId, clientId, datetime,
    customerName: item.customer_name || '',
    task: item.task || '',
    balance_due: item.balance_due || '',
    customer_phone: item.customer_phone || '',
    customer_email: item.customer_email || '',
    invoice_number: item.invoice_number || '',
    fired: false,
  });
  setTimedReminders(list);
}
function deleteTimedReminder(reminderId) {
  setTimedReminders(getTimedReminders().filter(r => r.id !== reminderId));
}
function getTimedRemindersForItem(itemId) {
  return getTimedReminders().filter(r => r.itemId === itemId && !r.fired);
}

        <div class="share-link">${escapeHtml(sharedUrl)}</div>
        <div class="qr-box"><img alt="QR" src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(sharedUrl)}" /></div>
        ${!GOOGLE_CLIENT_ID ? `<p class="error" style="font-size:13px">⚠️ לא הוגדר Client ID — יש להתחבר תחילה ל-Google כדי לקבל קישור משותף מלא.</p>` : ''}
        <div class="modal-actions">
          <a class="btn-link wa" target="_blank" rel="noreferrer" href="https://wa.me/?text=${waText}">💬 וואטסאפ</a>
          <a class="btn-link mail" href="mailto:?subject=${encodeURIComponent('ניהול גבייה')}&body=${encodeURIComponent(sharedUrl)}">✉️ מייל</a>
          <button id="closeShare">סגירה</button>
        </div>
      </div>
    </div>`;
}

/* =========================== Event binding ============================ */
function bindEvents() {
  const $ = s => root.querySelector(s);
  const $$ = s => [...root.querySelectorAll(s)];

  // Topbar
  $('#clientSelect')?.addEventListener('change', e => setActiveClient(e.target.value));
  $('#btnAllData')?.addEventListener('click', () => { state.showAllData = !state.showAllData; render(); });
  $('#btnCloseAllData')?.addEventListener('click', () => { state.showAllData = false; render(); });
  $('#btnClients')?.addEventListener('click', () => { state.showClientManager = true; state.clientEditingId = null; state.clientFormName = ''; state.clientFormUrl = ''; state.clientFormError = ''; render(); });
  $('#btnAddClientEmpty')?.addEventListener('click', () => { state.showClientManager = true; render(); });
  $('#btnGoogle')?.addEventListener('click', () => { state.showGoogleSetup = true; render(); });
  $('#btnShare')?.addEventListener('click', () => { state.showShare = true; render(); });
  $('#btnSync')?.addEventListener('click', doSync);
  $('#btnShowReminders')?.addEventListener('click', () => { state.showReminderPopup = true; render(); });
  $('#allDataSearch')?.addEventListener('input', e => { state.allDataSearch = e.target.value; render(); });

  // Reminders bar
  $('#remindersToggle')?.addEventListener('click', () => { state.remindersOpen = !state.remindersOpen; render(); });
  $$('.reminders-list li').forEach(li => li.addEventListener('click', () => setActiveClient(li.dataset.client)));

  // Notification bar
  $('#btnEnableNotif')?.addEventListener('click', () => requestNotif());
  $('#btnDismissNotifBar')?.addEventListener('click', () => { localStorage.setItem('collection_notifbar_dismissed', todayStr()); render(); });

  // Items table
  $('#searchInput')?.addEventListener('input', e => { state.search = e.target.value; render(); });
  $('#btnToggleAdd')?.addEventListener('click', () => { state.showAddForm = !state.showAddForm; render(); });
  $('#addForm')?.addEventListener('submit', onAddItem);
  $$('.rowEdit').forEach(b => b.addEventListener('click', e => { state.editingId = e.target.closest('tr').dataset.id; render(); }));
  $$('.rowCancel').forEach(b => b.addEventListener('click', () => { state.editingId = null; render(); }));
  $$('.rowDelete').forEach(b => b.addEventListener('click', e => onDeleteItem(e.target.closest('tr').dataset.id)));
  $$('.rowSave').forEach(b => b.addEventListener('click', e => onSaveItem(e.target.closest('tr'))));
  $$('.rowSetReminder').forEach(b => b.addEventListener('click', e => {
    state.timedReminderItemId = b.dataset.itemId;
    state.timedReminderClientId = b.dataset.clientId;
    render();
  }));

  // Overdue popup
  $('#rpClose')?.addEventListener('click', () => { state.showReminderPopup = false; render(); });
  $('#rpDismissDay')?.addEventListener('click', () => { setDismissedDate(); state.showReminderPopup = false; render(); });
  $('#rpSnooze2h')?.addEventListener('click', () => { setReminderSnooze(Date.now() + 2*60*60*1000); state.showReminderPopup = false; render(); });
  $('#rpBackdrop')?.addEventListener('click', e => { if (e.target.id === 'rpBackdrop') { state.showReminderPopup = false; render(); } });

  // Timed reminder dialog
  $('#trForm')?.addEventListener('submit', e => {
    e.preventDefault();
    const dt = $('#trDatetime').value;
    if (!dt) { alert('יש לבחור תאריך ושעה'); return; }
    if (new Date(dt).getTime() <= Date.now()) { alert('יש לבחור זמן עתידי'); return; }
    const client = state.clients.find(c => c.id === state.timedReminderClientId);
    const item = client ? getItems(state.timedReminderClientId).find(it => it.id === state.timedReminderItemId) : null;
    if (!item) return;
    addTimedReminder(state.timedReminderItemId, state.timedReminderClientId, dt, item);
    render();
    alert(`✅ תזכורת נקבעה ל-${new Date(dt).toLocaleString('he-IL')}`);
  });
  $('#trClose')?.addEventListener('click', () => { state.timedReminderItemId = null; render(); });
  $('#trCancel')?.addEventListener('click', () => { state.timedReminderItemId = null; render(); });
  $('#trBackdrop')?.addEventListener('click', e => { if (e.target.id === 'trBackdrop') { state.timedReminderItemId = null; render(); } });
  $$('.trDelete').forEach(b => b.addEventListener('click', () => { deleteTimedReminder(b.dataset.trId); render(); }));

  // Timed fire popup
  $('#trpDismiss')?.addEventListener('click', () => { state.firingTimedReminder = null; render(); });

  // Client manager
  $('#closeClientManager')?.addEventListener('click', () => { state.showClientManager = false; render(); });
  $('#clientBackdrop')?.addEventListener('click', e => { if (e.target.id === 'clientBackdrop') { state.showClientManager = false; render(); } });
  $('#clientForm')?.addEventListener('submit', onClientFormSubmit);
  $('#cancelClientEdit')?.addEventListener('click', () => { state.clientEditingId = null; state.clientFormName = ''; state.clientFormUrl = ''; render(); });
  $$('.clientEdit').forEach(b => b.addEventListener('click', e => onEditClient(e.target.closest('li').dataset.id)));
  $$('.clientDelete').forEach(b => b.addEventListener('click', e => onDeleteClient(e.target.closest('li').dataset.id)));

  // Google setup
  $('#closeGoogleSetup')?.addEventListener('click', () => { state.showGoogleSetup = false; render(); });
  $('#googleBackdrop')?.addEventListener('click', e => { if (e.target.id === 'googleBackdrop') { state.showGoogleSetup = false; render(); } });
  $('#saveClientId')?.addEventListener('click', () => {
    const v = $('#clientIdInput').value.trim();
    if (!v.endsWith('.apps.googleusercontent.com')) { alert('נראה שזה לא Client ID תקין'); return; }
    localStorage.setItem('collection_google_client_id', v); location.reload();
  });
  $('#connectGoogleBtn')?.addEventListener('click', connectGoogle);
  $('#resetClientId')?.addEventListener('click', () => { if (confirm('לאפס את ה-Client ID?')) { localStorage.removeItem('collection_google_client_id'); location.reload(); } });

  // Share
  $('#closeShare')?.addEventListener('click', () => { state.showShare = false; render(); });
  $('#shareBackdrop')?.addEventListener('click', e => { if (e.target.id === 'shareBackdrop') { state.showShare = false; render(); } });
}

/* =========================== Item actions ============================ */
function onAddItem(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const item = { id: uid(), updatedAt: nowIso() };
  COLUMNS.forEach(c => item[c.key] = (fd.get(c.key)||'').toString().trim());
  const client = activeClient();
  const items = getItems(client.id);
  items.push(item); setItems(client.id, items);
  state.showAddForm = false; render();
  if (client.sheetId && isGoogleAuthorized()) pushSingleItem(client, item).then(() => setItems(client.id, items));
}
function onDeleteItem(id) {
  if (!confirm('למחוק את הרשומה?')) return;
  const client = activeClient();
  let items = getItems(client.id).filter(it => it.id !== id);
  setItems(client.id, items);
  // also delete any timed reminders for this item
  setTimedReminders(getTimedReminders().filter(r => r.itemId !== id));
  render();
}
function onSaveItem(tr) {
  const client = activeClient();
  const id = tr.dataset.id;
  const items = getItems(client.id);
  const item = items.find(it => it.id === id); if (!item) return;
  tr.querySelectorAll('[data-field]').forEach(inp => { item[inp.dataset.field] = inp.value.trim(); });
  item.updatedAt = nowIso();
  setItems(client.id, items); state.editingId = null; render();
  if (client.sheetId && isGoogleAuthorized()) pushSingleItem(client, item).then(() => setItems(client.id, items));
}

/* =========================== Client actions ============================ */
function onClientFormSubmit(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const name = (fd.get('name')||'').toString().trim();
  const sheetUrl = (fd.get('sheetUrl')||'').toString().trim();
  const editingId = (fd.get('editingId')||'').toString();
  if (!name) { state.clientFormError = 'יש להזין שם לקוח'; render(); return; }
  const sheetId = extractSheetId(sheetUrl);
  if (editingId) {
    const c = state.clients.find(x => x.id === editingId);
    if (c) { c.name = name; c.sheetUrl = sheetUrl; c.sheetId = sheetId; }
  } else {
    state.clients.push({ id: uid(), name, sheetUrl, sheetId, sheetTab: 'Sheet1' });
  }
  persistClients();
  state.clientEditingId = null; state.clientFormName = ''; state.clientFormUrl = ''; state.clientFormError = '';
  if (!state.activeClientId) state.activeClientId = state.clients[0]?.id || '';
  render();
}
function onEditClient(id) {
  const c = state.clients.find(x => x.id === id); if (!c) return;
  state.clientEditingId = id; state.clientFormName = c.name; state.clientFormUrl = c.sheetUrl || ''; state.clientFormError = '';
  render();
}
function onDeleteClient(id) {
  const c = state.clients.find(x => x.id === id); if (!c) return;
  if (!confirm(`למחוק את "${c.name}"? הרשומות יימחקו מהאפליקציה (לא מ-Sheets).`)) return;
  state.clients = state.clients.filter(x => x.id !== id);
  localStorage.removeItem('collection_items_' + id);
  localStorage.removeItem('collection_lastsync_' + id);
  setTimedReminders(getTimedReminders().filter(r => r.clientId !== id));
  persistClients();
  if (state.activeClientId === id) state.activeClientId = state.clients[0]?.id || '';
  render();
}

/* =========================== Sync ============================ */
async function doSync() {
  const client = activeClient();
  if (!client?.sheetId) { state.syncMsg = 'ללקוח זה אין קישור ל-Google Sheet'; render(); return; }
  if (!GOOGLE_CLIENT_ID) { state.showGoogleSetup = true; render(); return; }
  state.syncing = true; state.syncMsg = 'מסנכרן...'; render();
  try {
    const r = await syncClient(client);
    state.syncMsg = `סונכרן ✓ (${r.pulled} חדשים מהטבלה, ${r.pushedNew} נשלחו, ${r.updated + r.pushedUpdates} עודכנו)`;
  } catch(e) {
    state.syncMsg = 'שגיאת סנכרון: ' + e.message;
  } finally {
    state.syncing = false; render();
    setTimeout(() => { state.syncMsg = ''; render(); }, 6000);
  }
}

/* =========================== Init ============================ */
function checkAndShowOverdueReminders() {
  const reminders = getAllReminders();
  if (!reminders.length || isReminderSnoozed() || getDismissedDate() === todayStr()) return;
  state.showReminderPopup = true;
  fireOverdueNotifs(reminders);
  render();
}

window.addEventListener('load', () => {
  initGoogleAuth();
  render();
  setTimeout(checkAndShowOverdueReminders, 1200);
  // auto-sync every 60s
  setInterval(() => {
    const c = activeClient();
    if (c?.sheetId && isGoogleAuthorized() && !state.syncing) doSync();
  }, 60000);
  // check timed reminders every 30 seconds
  setInterval(checkTimedReminders, 30000);
  // re-check overdue every 30 min
  setInterval(checkAndShowOverdueReminders, 30 * 60 * 1000);
});
</script>
